services:
  mariadb:
    image: mariadb:11
    container_name: sti-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_pass
      MARIADB_DATABASE: sti_db
      MARIADB_USER: sti_user
      MARIADB_PASSWORD: sti_pass
    ports:
      - "3306:3306"
    volumes:
      - sti_mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sti-network

  sti-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sti-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: sti_db
      DB_USER: sti_user
      DB_PASS: sti_pass
    volumes:
      - sti_logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - sti-network

  sti-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sti-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - sti-api
    networks:
      - sti-network

volumes:
  sti_mariadb_data:
    driver: local
  sti_logs:
    driver: local

networks:
  sti-network:
    driver: bridge
